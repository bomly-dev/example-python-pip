name: Bomly Guard

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Guard dependency changes
        uses: bomly-dev/bomly-guard@v1
        with:
          cli-token: ${{ github.token }}
          log-level: debug
          ecosystems: python
          fail-on: high
          comment-summary-in-pr: always
